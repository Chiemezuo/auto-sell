services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: autosell
      POSTGRES_USER: autosell
      POSTGRES_PASSWORD: autosell
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U autosell"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    # No host port binding — use an existing Redis on localhost:6379 for local dev,
    # or bring this up with --profile full where services talk via Docker network.
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  web:
    build: .
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    profiles:
      - full

  worker:
    build: .
    command: celery -A auto_sell worker -l info --pool=solo
    volumes:
      - .:/app
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    profiles:
      - worker
      - full

volumes:
  postgres_data:
